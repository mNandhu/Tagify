# Docker Compose configuration optimized for CI/testing environments
# Use this for automated testing and CI pipelines
services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: tagify-mongodb-ci
    restart: "no"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_ci:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # FastAPI backend
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: tagify-backend-ci
    restart: "no"
    volumes:
      - ./test_images:/data/test_images:ro
      - thumb_data_ci:/data/thumbs
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/
      THUMB_ROOT: /data/thumbs
      THUMB_MAX_SIZE: ${THUMB_MAX_SIZE:-1080}
      SCANNER_MAX_WORKERS: ${SCANNER_MAX_WORKERS:-0}
      AI_TAGGING_URL: ${AI_TAGGING_URL:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  mongodb_data_ci:
    driver: local
  thumb_data_ci:
    driver: local