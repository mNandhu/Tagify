services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: tagify-mongodb
    restart: "no"  # Changed from unless-stopped for CI compatibility
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI backend
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: tagify-backend
    restart: "no"  # Changed from unless-stopped for CI compatibility
    volumes:
      - thumb_data:/data/thumbs
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/
      THUMB_ROOT: /data/thumbs
      THUMB_MAX_SIZE: ${THUMB_MAX_SIZE:-1080}
      SCANNER_MAX_WORKERS: ${SCANNER_MAX_WORKERS:-0}
      AI_TAGGING_URL: ${AI_TAGGING_URL:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # React frontend
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: tagify-frontend
    restart: "no"  # Changed from unless-stopped for CI compatibility
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongodb_data:
    driver: local
  thumb_data:
    driver: local