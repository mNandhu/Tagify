[project]
name = "tagify-backend"
version = "0.1.0"
description = "Tagify backend API server (FastAPI)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi[standard]",
  "uvicorn",
  "sqlalchemy>=2.0",
  "aiosqlite",
  "pillow",
  "python-dotenv",
  "httpx",
  "numpy>=2.4.0,<3.0",
  "onnxruntime>=1.23.0,<2.0",
  "pydantic-settings>=2.14.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.uv]
environments = [
    "sys_platform == 'win32'",
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.9.0",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

